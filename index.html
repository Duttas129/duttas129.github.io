<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Dutta Residence</title>
  <meta name="description" content="Dutta Residence." />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏠</text></svg>" type="image/svg+xml" />
  <link rel="stylesheet" href="assets/theme.css" />
  <style>
    .splash {
      min-height: calc(100dvh - var(--bar-h));
      display: grid;
      place-content: center;
      justify-items: center;
      text-align: center;
      gap: 1rem;
      padding: 2rem;
    }
    .splash p {
      color: var(--text-dim);
      font-size: 0.82rem;
      text-transform: uppercase;
      letter-spacing: 0.22em;
    }
  </style>
</head>
<body>
  <picture class="bg">
    <source type="image/webp" sizes="100vw"
      srcset="assets/bg/bg-400.webp 400w, assets/bg/bg-600.webp 600w, assets/bg/bg-800.webp 800w, assets/bg/bg-1080.webp 1080w, assets/bg/bg-1440.webp 1440w, assets/bg/bg-1920.webp 1920w, assets/bg/bg-2400.webp 2400w" />
    <img src="assets/bg/bg-800.jpg" alt="" aria-hidden="true" decoding="async" fetchpriority="high"
      sizes="100vw"
      srcset="assets/bg/bg-400.jpg 400w, assets/bg/bg-600.jpg 600w, assets/bg/bg-800.jpg 800w, assets/bg/bg-1080.jpg 1080w, assets/bg/bg-1440.jpg 1440w, assets/bg/bg-1920.jpg 1920w, assets/bg/bg-2400.jpg 2400w" />
  </picture>

  <header class="topbar">
    <span aria-hidden="true"></span>
    <div class="lang-mount"></div>
  </header>

  <div class="splash">
    <div class="logo hero reveal" aria-label="Dutta Residence">
      <span class="l-d">Dutta</span><span class="l-r">Residence</span>
    </div>
    <p class="reveal" data-i18n="root_sub">Private residence</p>
  </div>

  <script src="assets/i18n.js"></script>
  <script src="assets/ui.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Dutta Residence</title>
  <meta name="description" content="Dutta Residence." />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏠</text></svg>" type="image/svg+xml" />
  <link rel="stylesheet" href="assets/theme.css" />
  <style>
    .splash {
      min-height: 100dvh;
      display: grid;
      place-content: center;
      text-align: center;
      gap: 0.5rem;
      padding: 2rem;
    }
    .splash .mark { font-size: clamp(2rem, 8vw, 3.2rem); font-weight: 700; letter-spacing: -0.03em; }
    .splash .mark b {
      background: var(--grad-blue);
      -webkit-background-clip: text; background-clip: text; color: transparent;
    }
    .splash p {
      color: var(--text-dim);
      font-size: 0.95rem;
      text-transform: uppercase;
      letter-spacing: 0.18em;
    }
  </style>
</head>
<body>
  <div class="aurora"></div>
  <div class="splash">
    <div class="mark reveal">Dutta <b>Residence</b></div>
    <p class="reveal" data-i18n="root_sub">Private residence</p>
  </div>
  <script src="assets/i18n.js"></script>
</body>
</html>
